<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A股行情终端 Pro v4</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>A股 K 线 + 实时图 + 主力监控</h1>
  <div class="toolbar">
    <input id="code" placeholder="例如：600519 / 000001 / 300750 / sh000001" value="600519" />
    <button id="loadBtn">加载/刷新</button>
    <button id="scanBtn">多指标共振选股</button>
    <select id="scanDepth">
      <option value="fast">快速(~500)</option>
      <option value="std" selected>标准(~1500)</option>
      <option value="deep">深度(3000+)</option>
    </select>
    <span id="scanStatus" class="badge">—</span>
  </div>
</header>

<div class="wrap">

  <!-- ── 左栏 ── -->
  <aside>

    <div class="card">
      <div class="section-title">基础信息</div>
      <div id="basic" class="kv muted">—</div>

      <div class="section-title">自动分析（含预测）</div>
      <div id="analysis" class="analysis">（加载后自动生成简评）</div>

      <div class="section-title">高级指标 & 盘面要点</div>
      <div id="advanced" class="analysis">—</div>
    </div>

    <!-- 查看历史 -->
    <div class="card">
      <div class="section-title">
        <span>查看历史</span>
        <button id="clearHistoryBtn" class="btn-ghost">清空</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>

    <!-- 筛选结果 -->
    <div class="card">
      <div class="section-title">多指标共振选股结果</div>
      <div id="scanResult" class="analysis">点击"多指标共振选股 Top20"开始扫描。</div>
    </div>

  </aside>

  <!-- ── 右栏 ── -->
  <main>

    <!-- K 线图 -->
    <div id="kline" class="card"></div>

    <!-- MACD 副图 -->
    <div id="subchart" class="card"></div>

    <!-- KDJ 金叉筛选 -->
    <div class="card">
      <div class="section-title">KDJ 金叉筛选</div>
      <div class="row">
        <button id="kdjBtn">筛选 KDJ 金叉</button>
        <select id="kdjLookback" title="在最近 N 日内出现金叉">
          <option value="1" selected>当日新金叉</option>
          <option value="3">近3日新金叉</option>
          <option value="5">近5日新金叉</option>
        </select>
        <label class="row" style="gap:4px; cursor:pointer;">
          <input id="kdjOversold" type="checkbox" checked />
          <span class="muted">超卖区金叉（K 或 D &lt; 20）</span>
        </label>
        <label class="row" style="gap:4px; cursor:pointer;">
          <input id="kdjJUp" type="checkbox" />
          <span class="muted">J 上拐</span>
        </label>
        <span id="kdjStatus" class="badge">—</span>
      </div>
      <div id="kdjResult" class="muted">点击"筛选 KDJ 金叉"开始扫描。</div>
    </div>

    <!-- KDJ + MACD 共振 -->
    <div class="card">
      <div class="section-title">KDJ + MACD 共振买入 Top20</div>
      <div class="row">
        <button id="confluenceBtn">筛选共振买入 Top20</button>
        <select id="cfLookback">
          <option value="1" selected>当日</option>
          <option value="3">近3日</option>
          <option value="5">近5日</option>
        </select>
        <label class="row" style="gap:4px; cursor:pointer;">
          <input id="cfOversold" type="checkbox" checked />
          <span class="muted">低位金叉</span>
        </label>
        <label class="row" style="gap:4px; cursor:pointer;">
          <input id="cfZeroAxis" type="checkbox" checked />
          <span class="muted">MACD 零轴上方</span>
        </label>
        <label class="row" style="gap:4px; cursor:pointer;">
          <input id="cfJUp" type="checkbox" />
          <span class="muted">J 上拐</span>
        </label>
        <span id="cfStatus" class="badge">—</span>
      </div>
      <div id="cfResult" class="muted">点击"筛选共振买入 Top20"开始扫描。</div>
    </div>

  </main>
</div>

<footer>排除 ST / 退市 / 当日涨幅 ≥ 10%；预测为线性回归外推，仅供参考，不构成投资建议。</footer>

<script src="app.js"></script>
</body>
</html>
