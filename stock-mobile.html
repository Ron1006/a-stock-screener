<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>A股行情 Pro</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    /* ── CSS Variables ── */
    :root {
      --bg:     #0b0f14;
      --card:   #121821;
      --text:   #dbe4f0;
      --muted:  #8aa0b2;
      --accent: #1b63ff;
      --border: #1f2833;
      --pos:    #36d399;
      --neg:    #f86d6d;
      --top-h:  56px;
      --bot-h:  64px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overscroll-behavior: none;
    }

    /* ── Top bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      background: #0c1117;
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top));
    }

    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-row input {
      flex: 1;
      min-width: 0;
      background: #0e1520;
      border: 1px solid #263241;
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .search-row input::placeholder { color: var(--muted); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Page content ── */
    #pageMain {
      padding-top: calc(var(--top-h) + max(4px, env(safe-area-inset-top)));
      padding-bottom: calc(var(--bot-h) + max(8px, env(safe-area-inset-bottom)));
      padding-left: 12px;
      padding-right: 12px;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-top: 10px;
    }

    .section-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.03em; }

    /* ── Basic info ── */
    .basic-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .stock-name { font-size: 17px; font-weight: 700; }
    .stock-code { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
    .stock-price { font-size: 24px; font-weight: 700; text-align: right; }
    .stock-chg   { font-size: 14px; font-weight: 600; text-align: right; margin-top: 2px; }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      font-size: 12px;
    }
    .info-kv { display: flex; gap: 5px; }
    .info-kv .lbl { color: var(--muted); }

    /* ── Collapsible section ── */
    .section-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }
    .toggle-arrow { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
    .toggle-arrow.open { transform: rotate(180deg); }

    .section-body { margin-top: 10px; }
    .section-body.collapsed { display: none; }

    .analysis-text {
      font-size: 12px;
      line-height: 1.65;
      color: #cfe1f1;
    }

    /* ── Indicator tip icons ── */
    .tip-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1c2d40;
      color: #6a96b8;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      vertical-align: middle;
      margin-left: 3px;
      border: 1px solid #2e4a65;
      flex-shrink: 0;
      user-select: none;
    }
    .tip-icon:hover { background: #1b63ff; color: #fff; border-color: #1b63ff; }

    #tip-popup {
      position: fixed;
      z-index: 9999;
      max-width: 260px;
      background: #141e2c;
      border: 1px solid #2e4a65;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12px;
      color: #cfe1f1;
      line-height: 1.7;
      box-shadow: 0 6px 28px rgba(0,0,0,0.65);
      display: none;
      white-space: pre-wrap;
      pointer-events: none;
    }
    #tip-popup.active { display: block; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      background: #0c1117;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding-bottom: max(6px, env(safe-area-inset-bottom));
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 4px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s;
      line-height: 1.2;
    }

    .nav-btn:active { color: var(--accent); }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.active { opacity: 1; pointer-events: all; }

    /* ── Bottom sheet modal ── */
    .modal {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 90dvh;           /* dvh = dynamic viewport height, falls back to vh */
      max-height: 90vh;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 100;
      display: flex;
      flex-direction: column;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    .modal.open { transform: translateY(0); }

    .drag-handle {
      width: 36px; height: 4px;
      background: #314057;
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 16px; font-weight: 700; }

    .close-btn {
      background: #1a2535;
      border: none;
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 50%;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── Modal filter controls row ── */
    .modal-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .modal-controls select {
      background: #0e1520;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .chk-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .chk-label input[type=checkbox] { accent-color: var(--accent); }

    .status-pill {
      margin-left: auto;
      font-size: 11px;
      color: #a9bed0;
      padding: 3px 10px;
      border: 1px solid #314057;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── Modal body (scrollable) ── */
    .modal-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 10px 14px;
    }

    /* ── Modal footer ── */
    .modal-footer {
      padding: 10px 16px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .action-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Scan result tables ── */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .table-wrap table {
      border-collapse: collapse;
      font-size: 11px;
      white-space: nowrap;
      min-width: 100%;
    }

    .table-wrap th,
    .table-wrap td {
      border-bottom: 1px solid var(--border);
      padding: 7px 8px;
      text-align: left;
    }

    .table-wrap thead th {
      position: sticky;
      top: 0;
      background: var(--card);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      z-index: 1;
      box-shadow: 0 1px 0 var(--border);
    }

    /* ── History items ── */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .history-item:active { background: #1a2535; }
    .hi-name { font-size: 14px; }
    .hi-code { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
    .hi-chg  { font-size: 13px; font-weight: 600; }
    .hi-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .history-actions {
      display: flex;
      justify-content: flex-end;
      padding: 8px 4px 0;
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── Mini "查看" button ── */
    .mini-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }

    /* ── Utility ── */
    .pos   { color: var(--pos); }
    .neg   { color: var(--neg); }
    .muted { color: var(--muted); }
    .code  { font-family: ui-monospace, monospace; }
    .empty-hint { color: var(--muted); font-size: 13px; text-align: center; padding: 40px 0; }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<header class="top-bar">
  <div class="search-row">
    <input id="code" type="text" inputmode="numeric" placeholder="股票代码，如 600519" value="600519" />
    <button id="loadBtn" class="btn-primary">加载</button>
    <button id="historyBtn" class="btn-outline">历史</button>
  </div>
</header>

<!-- ── Main content ── -->
<main id="pageMain">

  <!-- Basic info -->
  <div class="card" id="basicCard">
    <div class="muted" style="font-size:13px;">请输入代码并点击加载</div>
  </div>

  <!-- Auto analysis (collapsible) -->
  <div class="card">
    <div class="section-toggle" id="analysisToggle">
      <span>自动分析</span>
      <span class="toggle-arrow open" id="analysisArrow">▼</span>
    </div>
    <div class="section-body" id="analysisBody">
      <div id="analysis" class="analysis-text muted">加载后自动生成…</div>
    </div>
  </div>

  <!-- Advanced indicators (collapsible, collapsed by default) -->
  <div class="card">
    <div class="section-toggle" id="advancedToggle">
      <span>高级指标 &amp; 盘面要点</span>
      <span class="toggle-arrow" id="advancedArrow">▼</span>
    </div>
    <div class="section-body collapsed" id="advancedBody">
      <div id="advanced" class="analysis-text muted">—</div>
    </div>
  </div>


</main>

<!-- ── Bottom navigation ── -->
<nav class="bottom-nav">
  <button class="nav-btn" id="scanBtn">
    <span class="nav-icon">📊</span>
    <span class="nav-label">共振选股</span>
  </button>
  <button class="nav-btn" id="kdjBtn">
    <span class="nav-icon">🔔</span>
    <span class="nav-label">KDJ 金叉</span>
  </button>
  <button class="nav-btn" id="confluenceBtn">
    <span class="nav-icon">⚡</span>
    <span class="nav-label">双线共振</span>
  </button>
</nav>

<!-- ── Overlay ── -->
<div id="overlay" class="overlay"></div>

<!-- ══════════════════════════════════════════
     Modal: 查看历史
══════════════════════════════════════════ -->
<div id="modalHistory" class="modal">
  <div class="drag-handle"></div>
  <div class="modal-header">
    <span class="modal-title">查看历史记录</span>
    <button class="close-btn" data-close="modalHistory">✕</button>
  </div>
  <div class="modal-body" id="historyList"></div>
  <div class="modal-footer">
    <button id="clearHistoryBtn" class="btn-ghost" style="width:100%;">清空历史</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     Modal: 多指标共振选股
══════════════════════════════════════════ -->
<div id="modalScan" class="modal">
  <div class="drag-handle"></div>
  <div class="modal-header">
    <span class="modal-title">多指标共振选股</span>
    <button class="close-btn" data-close="modalScan">✕</button>
  </div>
  <div class="modal-controls">
    <select id="scanDepth">
      <option value="fast">快速(~500只)</option>
      <option value="std" selected>标准(~1500只)</option>
      <option value="deep">深度(3000+只)</option>
    </select>
    <span id="scanStatus" class="status-pill">—</span>
  </div>
  <div class="modal-body" id="scanResult">
    <div class="empty-hint">点击下方「筛选」按钮开始扫描</div>
  </div>
  <div class="modal-footer">
    <button id="reScanBtn" class="action-btn">筛选</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     Modal: KDJ 金叉筛选
══════════════════════════════════════════ -->
<div id="modalKdj" class="modal">
  <div class="drag-handle"></div>
  <div class="modal-header">
    <span class="modal-title">KDJ 金叉筛选</span>
    <button class="close-btn" data-close="modalKdj">✕</button>
  </div>
  <div class="modal-controls">
    <select id="kdjDepth">
      <option value="fast">快速</option>
      <option value="std" selected>标准</option>
      <option value="deep">深度</option>
    </select>
    <select id="kdjLookback">
      <option value="1" selected>当日金叉</option>
      <option value="3">近 3 日</option>
      <option value="5">近 5 日</option>
    </select>
    <label class="chk-label"><input id="kdjOversold" type="checkbox" checked />超卖区</label>
    <label class="chk-label"><input id="kdjJUp" type="checkbox" />J 上拐</label>
    <span id="kdjStatus" class="status-pill">—</span>
  </div>
  <div class="modal-body" id="kdjResult">
    <div class="empty-hint">点击下方「筛选」按钮开始扫描</div>
  </div>
  <div class="modal-footer">
    <button id="reKdjBtn" class="action-btn">筛选</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     Modal: KDJ + MACD 共振
══════════════════════════════════════════ -->
<div id="modalCf" class="modal">
  <div class="drag-handle"></div>
  <div class="modal-header">
    <span class="modal-title">KDJ + MACD 双线共振</span>
    <button class="close-btn" data-close="modalCf">✕</button>
  </div>
  <div class="modal-controls">
    <select id="cfDepth">
      <option value="fast">快速</option>
      <option value="std" selected>标准</option>
      <option value="deep">深度</option>
    </select>
    <select id="cfLookback">
      <option value="1" selected>当日</option>
      <option value="3">近 3 日</option>
      <option value="5">近 5 日</option>
    </select>
    <label class="chk-label"><input id="cfOversold"  type="checkbox" checked />低位金叉</label>
    <label class="chk-label"><input id="cfZeroAxis"  type="checkbox" checked />零轴上方</label>
    <label class="chk-label"><input id="cfJUp"       type="checkbox" />J 上拐</label>
    <span id="cfStatus" class="status-pill">—</span>
  </div>
  <div class="modal-body" id="cfResult">
    <div class="empty-hint">点击下方「筛选」按钮开始扫描</div>
  </div>
  <div class="modal-footer">
    <button id="reCfBtn" class="action-btn">筛选</button>
  </div>
</div>

<script src="app-mobile.js"></script>
</body>
</html>
